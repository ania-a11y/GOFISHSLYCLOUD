<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RD Web Access</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #7da1bf;
            background: linear-gradient(#86abc9, #5e88ad);
        }

        .container {
            width: 980px;
            max-width: 94%;
            margin: 50px auto;
            background: #fff;
            box-shadow: 0 0 15px rgba(0, 0, 0, .3);
            border-radius: 4px;
            overflow: hidden;
        }

        .header {
            min-height: 150px;
            background: linear-gradient(#dfeaf4, #ffffff);
            border-bottom: 4px solid #ff8b1a;
        }

        .logo {
            padding: 35px;
            font-size: 46px;
        }

            .logo small {
                display: block;
                font-size: 18px;
                color: #555;
                margin-top: 8px;
            }

        .content {
            padding: 50px 60px 60px;
        }

        .form-title {
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            color: #333;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        td {
            padding: 10px 8px;
            font-size: 22px;
            vertical-align: middle;
        }

        label {
            white-space: nowrap;
        }

        input {
            width: 320px;
            height: 38px;
            border: 2px solid #555;
            background: #eef5fd;
            font-size: 18px;
            padding: 0 10px;
            box-sizing: border-box;
            border-radius: 3px;
        }

            input:focus {
                outline: none;
                border-color: #2f6ea5;
                box-shadow: 0 0 0 3px rgba(47, 110, 165, 0.15);
            }

        .hint {
            width: 320px;
            margin: 4px 0 0;
            font-size: 13px;
            color: #666;
        }

        .buttons {
            text-align: center;
            margin-top: 30px;
        }

        button {
            font-size: 18px;
            padding: 8px 20px;
            margin: 0 6px;
            cursor: pointer;
            border: 1px solid #666;
            border-radius: 3px;
            background: #f3f3f3;
        }

            button:hover {
                background: #e7e7e7;
            }

        .footer {
            background: linear-gradient(#d9ebfb, #8cb2d9);
            min-height: 60px;
            line-height: 60px;
            padding: 0 25px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
        }

        .error-message {
            color: #b00020;
            font-size: 14px;
            text-align: center;
            margin-top: 18px;
            min-height: 20px;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 34px;
            }

            .content {
                padding: 30px 20px 40px;
            }

            table, tbody, tr, td {
                display: block;
                width: 100%;
            }

            td {
                padding: 6px 0;
                font-size: 18px;
            }

            input, .hint {
                width: 100%;
            }

            .footer {
                flex-direction: column;
                align-items: center;
                line-height: 1.6;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                工作資源
                <small>RemoteApp 和桌面連線</small>
            </div>
        </div>

        <div class="content">
            <div class="form-title">變更密碼</div>

            <form action="" method="POST" autocomplete="on" id="passwordChangeForm">
                <table>
                    <tbody>
                        <tr>
                            <td align="right">
                                <label for="username">網域\使用者名稱:</label>
                            </td>
                            <td>
                                <input type="text"
                                       id="username"
                                       name="username"
                                       autocomplete="username"
                                       required
                                       maxlength="100" />
                                <div class="hint">請輸入網域\帳號，例如：DOMAIN\user</div>
                            </td>
                        </tr>

                        <tr>
                            <td align="right">
                                <label for="password">目前密碼:</label>
                            </td>
                            <td>
                                <input type="password"
                                       id="password"
                                       name="password"
                                       autocomplete="current-password"
                                       required
                                       maxlength="128" />
                            </td>
                        </tr>

                        <tr>
                            <td align="right">
                                <label for="new_password">新密碼:</label>
                            </td>
                            <td>
                                <input type="password"
                                       id="new_password"
                                       name="new_password"
                                       autocomplete="new-password"
                                       required
                                       minlength="8"
                                       maxlength="128" />
                                <div class="hint">建議至少 8 碼，並包含大小寫字母、數字與特殊字元。</div>
                            </td>
                        </tr>

                        <tr>
                            <td align="right">
                                <label for="confirm_password">確認新密碼:</label>
                            </td>
                            <td>
                                <input type="password"
                                       id="confirm_password"
                                       name="confirm_password"
                                       autocomplete="new-password"
                                       required
                                       minlength="8"
                                       maxlength="128" />
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="buttons">
                    <button type="submit">提交</button>
                    <button type="reset">取消</button>
                </div>

                <div class="error-message" id="errorMessage"></div>
            </form>
        </div>

        <div class="footer">
            <div>Windows Server® 2019</div>
            <div><b>Microsoft</b></div>
        </div>
    </div>

    <script>
        (function () {
            const form = document.getElementById('passwordChangeForm');
            const newPassword = document.getElementById('new_password');
            const confirmPassword = document.getElementById('confirm_password');
            const errorMessage = document.getElementById('errorMessage');

            form.addEventListener('submit', function (e) {
                errorMessage.textContent = '';

                if (newPassword.value !== confirmPassword.value) {
                    e.preventDefault();
                    errorMessage.textContent = '新密碼與確認新密碼不一致，請重新輸入。';
                    confirmPassword.focus();
                    return;
                }
            });

            form.addEventListener('reset', function () {
                errorMessage.textContent = '';
            });
        })();
    </script>
</body>
</html>
